version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: Postgres_db
    environment:
      POSTGRES_USER: gg
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./AccountRegistrationApp/Services/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  postgres_data:
